<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Notifyr</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#e8c93a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Notifyr" />
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#0f0e00;--bg2:#1a1800;--bg3:#242100;--border:#3a3500;
      --accent:#e8c93a;--accent2:#f5d94e;--dim:#7a7020;
      --text:#f0e580;--text2:#a89e3a;--danger:#e05c2a;--r:14px;
      --sat:env(safe-area-inset-top,0px);--sar:env(safe-area-inset-right,0px);
      --sab:env(safe-area-inset-bottom,0px);--sal:env(safe-area-inset-left,0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html{height:100%;overflow:hidden;position:fixed;width:100%}
    body{height:100%;width:100%;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
      overscroll-behavior:none;background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;
      padding-top:var(--sat);padding-right:var(--sar);padding-left:var(--sal);padding-bottom:var(--sab)}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(232,201,58,0.08) 0%,transparent 60%),
      repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(232,201,58,0.015) 40px,rgba(232,201,58,0.015) 41px)}
    .app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:0 1rem 2rem}
    header{padding:1.5rem 0 1.25rem;display:flex;align-items:flex-end;justify-content:space-between;
      border-bottom:1px solid var(--border);margin-bottom:1.5rem}
    .logo{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(1.8rem,8vw,2.8rem);
      letter-spacing:-0.04em;color:var(--accent);line-height:1}
    .logo span{color:var(--text2);font-weight:700}
    .tagline{font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:.3rem}
    .banner{display:none;background:linear-gradient(135deg,rgba(232,201,58,.12),rgba(232,201,58,.05));
      border:1px solid var(--accent);border-radius:var(--r);padding:.9rem 1.1rem;
      margin-bottom:1rem;align-items:center;gap:.75rem}
    .banner.show{display:flex}
    .banner p{flex:1;font-size:.75rem;color:var(--text2);line-height:1.5}
    .card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
    .card-title{font-family:'Syne',sans-serif;font-size:.65rem;font-weight:700;text-transform:uppercase;
      letter-spacing:.15em;color:var(--dim);margin-bottom:1rem}
    .form-group{margin-bottom:.75rem}
    .form-row{display:grid;grid-template-columns:1fr auto;gap:.75rem;align-items:flex-end}
    label{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text2);margin-bottom:.35rem}
    input[type=text],input[type=datetime-local],textarea{width:100%;background:var(--bg3);border:1px solid var(--border);
      border-radius:10px;padding:.7rem .9rem;color:var(--text);font-family:'Space Mono',monospace;
      font-size:.85rem;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none}
    input:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,201,58,.12)}
    input[type=datetime-local]::-webkit-calendar-picker-indicator{filter:invert(80%) sepia(50%) saturate(300%) hue-rotate(10deg);cursor:pointer}
    textarea{resize:vertical;min-height:72px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem 1.25rem;
      border-radius:10px;font-family:'Syne',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.04em;
      cursor:pointer;border:none;transition:all .15s;white-space:nowrap;user-select:none;-webkit-user-select:none}
    .btn:active{transform:scale(0.95)}
    .btn-primary{background:var(--accent);color:#0f0e00}
    .btn-primary:hover{background:var(--accent2)}
    .btn-sm{padding:.5rem .9rem;font-size:.75rem}
    .btn-test{background:var(--bg3);color:var(--accent);border:1px solid var(--accent);width:100%;padding:1rem;font-size:.9rem}
    .btn-test:active{background:rgba(232,201,58,.1)}
    .pulse-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
    .btn-del{background:transparent;border:none;color:var(--danger);cursor:pointer;padding:.4rem .6rem;
      font-size:1rem;opacity:.6;transition:opacity .15s;border-radius:6px;flex-shrink:0;user-select:none;-webkit-user-select:none}
    .btn-del:active{opacity:1;background:rgba(224,92,42,.12)}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem}
    .section-title{font-family:'Syne',sans-serif;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.15em;color:var(--dim)}
    .badge{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:.15rem .55rem;font-size:.68rem;color:var(--text2)}
    .notif-list{display:flex;flex-direction:column;gap:.6rem}
    .notif-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:.9rem 1rem;
      display:flex;align-items:flex-start;gap:.85rem;animation:slideIn .22s ease;transition:opacity .3s,border-color .3s}
    .notif-item.fired{opacity:.35;border-color:transparent}
    @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    .notif-icon{width:34px;height:34px;background:var(--bg3);border-radius:8px;display:flex;
      align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;border:1px solid var(--border)}
    .notif-body{flex:1;min-width:0}
    .notif-title{font-family:'Syne',sans-serif;font-weight:700;font-size:.88rem;color:var(--text);
      margin-bottom:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .notif-msg{font-size:.72rem;color:var(--text2);margin-bottom:.4rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .notif-meta{font-size:.65rem;color:var(--dim);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
    .notif-meta .cd{color:var(--accent);font-weight:700}
    .pill{font-size:.6rem;padding:.15rem .45rem;border-radius:4px;background:rgba(232,201,58,.1);
      color:var(--accent);border:1px solid rgba(232,201,58,.2)}
    .pill.done{background:rgba(255,255,255,.04);color:var(--dim);border-color:var(--border)}
    .empty{text-align:center;padding:2.5rem 1rem;color:var(--dim)}
    .empty .icon{font-size:2rem;margin-bottom:.6rem;opacity:.4}
    .empty p{font-size:.75rem;line-height:1.6}
    .divider{height:1px;background:var(--border);margin:1.25rem 0}
    #toast{position:fixed;bottom:calc(1.5rem + var(--sab));left:50%;
      transform:translateX(-50%) translateY(5rem);
      background:var(--accent);color:#0f0e00;font-family:'Syne',sans-serif;font-weight:700;font-size:.8rem;
      padding:.7rem 1.4rem;border-radius:50px;z-index:200;
      transition:transform .3s cubic-bezier(.34,1.56,.64,1),opacity .3s;
      opacity:0;white-space:nowrap;pointer-events:none;box-shadow:0 6px 24px rgba(232,201,58,.35)}
    #toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    @media(max-width:420px){.form-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="logo">Notifyr<span>.</span></div>
      <div class="tagline">Scheduled notifications</div>
    </div>
  </header>
  <div class="banner" id="install-bar">
    <p>&#128242; Install for the full app experience</p>
    <button class="btn btn-primary btn-sm" id="install-btn">Install</button>
  </div>
  <div class="banner" id="perm-bar">
    <p>&#128276; Allow notifications to use this app</p>
    <button class="btn btn-primary btn-sm" id="grant-btn">Allow</button>
  </div>
  <div class="card">
    <div class="card-title">Quick Test</div>
    <button class="btn btn-test" id="test-btn">
      <span class="pulse-dot"></span>
      Send Test Notification Now
    </button>
  </div>
  <div class="card">
    <div class="card-title">Schedule Notification</div>
    <div class="form-group">
      <label for="n-title">Title</label>
      <input type="text" id="n-title" placeholder="e.g. Take medication" maxlength="60" />
    </div>
    <div class="form-group">
      <label for="n-body">Message <span style="color:var(--dim)">(optional)</span></label>
      <textarea id="n-body" placeholder="Notification body..." maxlength="200"></textarea>
    </div>
    <div class="form-row">
      <div>
        <label for="n-time">Date &amp; Time</label>
        <input type="datetime-local" id="n-time" />
      </div>
      <button class="btn btn-primary" id="add-btn">+ Add</button>
    </div>
  </div>
  <div class="divider"></div>
  <div class="section-header">
    <span class="section-title">Scheduled</span>
    <span class="badge" id="badge">0</span>
  </div>
  <div class="notif-list" id="list"></div>
</div>
<div id="toast"></div>
<script>
var notifs=[];try{notifs=JSON.parse(localStorage.getItem('notifyr')||'[]')}catch(e){}
var timers={},deferredInstall=null;
if('serviceWorker'in navigator){navigator.serviceWorker.register('/notifyr/sw.js',{scope:'/notifyr/'}).then(function(r){console.log('SW ok',r.scope)}).catch(function(e){console.warn('SW fail',e)})}
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredInstall=e;if(!window.matchMedia('(display-mode: standalone)').matches){document.getElementById('install-bar').classList.add('show')}});
document.getElementById('install-btn').addEventListener('click',function(){if(!deferredInstall)return;deferredInstall.prompt();deferredInstall.userChoice.then(function(r){if(r.outcome==='accepted'){document.getElementById('install-bar').classList.remove('show');showToast('App installed!')}deferredInstall=null})});
window.addEventListener('appinstalled',function(){document.getElementById('install-bar').classList.remove('show')});
function checkPerm(){if(!('Notification'in window))return;if(Notification.permission!=='granted'){document.getElementById('perm-bar').classList.add('show')}}
document.getElementById('grant-btn').addEventListener('click',function(){Notification.requestPermission().then(function(p){if(p==='granted'){document.getElementById('perm-bar').classList.remove('show');showToast('Notifications enabled!')}else{showToast('Permission denied')}})});
var toastT;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){t.classList.remove('show')},2600)}
function ensurePerm(cb){if(Notification.permission==='granted'){cb(true);return}Notification.requestPermission().then(function(p){if(p==='granted'){document.getElementById('perm-bar').classList.remove('show');cb(true)}else{showToast('Permission denied');cb(false)}})}
function fire(title,body){if(navigator.serviceWorker.controller){navigator.serviceWorker.controller.postMessage({type:'NOTIFY',title:title,body:body||''})}else{new Notification(title,{body:body||'',icon:'/notifyr/icons/icon-192.png',badge:'/notifyr/icons/icon-192.png',vibrate:[200,100,200],tag:'notifyr-'+Date.now()})}}
document.getElementById('test-btn').addEventListener('click',function(){ensurePerm(function(ok){if(!ok)return;fire('Notifyr Test','Push notifications are working!');showToast('Test sent!')})});
document.getElementById('add-btn').addEventListener('click',function(){var title=document.getElementById('n-title').value.trim(),body=document.getElementById('n-body').value.trim(),time=document.getElementById('n-time').value;if(!title){showToast('Enter a title first');return}if(!time){showToast('Pick a date and time');return}var ts=new Date(time).getTime();if(ts<=Date.now()){showToast('Pick a future time!');return}ensurePerm(function(ok){if(!ok)return;var id=crypto.randomUUID?crypto.randomUUID():Date.now().toString(36)+Math.random().toString(36).slice(2);var n={id:id,title:title,body:body,ts:ts,fired:false};notifs.push(n);save();render();scheduleTimer(n);document.getElementById('n-title').value='';document.getElementById('n-body').value='';document.getElementById('n-time').value='';showToast('Scheduled!')})});
function scheduleTimer(n){if(n.fired)return;var delay=n.ts-Date.now();if(delay<=0)return;clearTimeout(timers[n.id]);timers[n.id]=setTimeout(function(){fire(n.title,n.body||'Notifyr reminder');var found=notifs.find(function(x){return x.id===n.id});if(found){found.fired=true;save();render()}},delay)}
function deleteNotif(id){clearTimeout(timers[id]);delete timers[id];notifs=notifs.filter(function(n){return n.id!==id});save();render();showToast('Removed')}
function save(){try{localStorage.setItem('notifyr',JSON.stringify(notifs))}catch(e){}}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtCountdown(ts){var d=ts-Date.now();if(d<=0)return'now';var s=Math.floor(d/1000),m=Math.floor(s/60),h=Math.floor(m/60),dy=Math.floor(h/24);if(dy>0)return dy+'d '+(h%24)+'h';if(h>0)return h+'h '+(m%60)+'m';if(m>0)return m+'m '+(s%60)+'s';return s+'s'}
function fmtDate(ts){return new Date(ts).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}
function render(){var list=document.getElementById('list'),badge=document.getElementById('badge');badge.textContent=notifs.filter(function(n){return!n.fired}).length;if(notifs.length===0){list.innerHTML='<div class="empty"><div class="icon">&#128339;</div><p>No notifications yet.<br/>Schedule one above.</p></div>';return}var sorted=notifs.slice().sort(function(a,b){return a.fired!==b.fired?(a.fired?1:-1):a.ts-b.ts});list.innerHTML=sorted.map(function(n){return'<div class="notif-item'+(n.fired?' fired':'')+'"><div class="notif-icon">'+(n.fired?'&#10003;':'&#128276;')+'</div><div class="notif-body"><div class="notif-title">'+esc(n.title)+'</div>'+(n.body?'<div class="notif-msg">'+esc(n.body)+'</div>':'')+'<div class="notif-meta"><span>'+fmtDate(n.ts)+'</span>'+(!n.fired?'<span class="cd" id="cd-'+n.id+'">&#183; '+fmtCountdown(n.ts)+'</span>':'')+'<span class="pill'+(n.fired?' done':'')+'">'+( n.fired?'sent':'pending')+'</span></div></div><button class="btn-del" onclick="deleteNotif(''+n.id+'')" title="Remove">&#10005;</button></div>'}).join('')}
setInterval(function(){notifs.filter(function(n){return!n.fired}).forEach(function(n){var el=document.getElementById('cd-'+n.id);if(el)el.textContent='&#183; '+fmtCountdown(n.ts)})},1000);
(function(){var now=new Date(),pad=function(x){return String(x).padStart(2,'0')};document.getElementById('n-time').min=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate())+'T'+pad(now.getHours())+':'+pad(now.getMinutes());checkPerm();render();notifs.filter(function(n){return!n.fired}).forEach(scheduleTimer)})();
</script>
</body>
</html>
