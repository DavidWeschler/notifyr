<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifyr</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1a1700" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Notifyr" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0f0e00;
      --bg2:       #1a1800;
      --bg3:       #242100;
      --border:    #3a3500;
      --accent:    #e8c93a;
      --accent2:   #f5d94e;
      --dim:       #7a7020;
      --text:      #f0e580;
      --text2:     #a89e3a;
      --danger:    #e05c2a;
      --success:   #5cb85c;
      --radius:    12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow-x: hidden;
    }

    /* Background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,201,58,0.08) 0%, transparent 60%),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 40px,
          rgba(232,201,58,0.015) 40px,
          rgba(232,201,58,0.015) 41px
        );
      pointer-events: none;
      z-index: 0;
    }

    .app {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 1rem 6rem;
      min-height: 100%;
    }

    /* Header */
    header {
      padding: 2rem 0 1.5rem;
      display: flex;
      align-items: flex-end;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 8vw, 3rem);
      letter-spacing: -0.04em;
      color: var(--accent);
      line-height: 1;
    }

    .logo span {
      color: var(--text2);
      font-weight: 400;
    }

    .tagline {
      font-size: 0.7rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.25rem;
    }

    /* Permission banner */
    #permission-banner {
      display: none;
      background: linear-gradient(135deg, rgba(232,201,58,0.12), rgba(232,201,58,0.05));
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      align-items: center;
      gap: 1rem;
    }

    #permission-banner.show { display: flex; }

    #permission-banner p {
      flex: 1;
      font-size: 0.8rem;
      color: var(--text2);
      line-height: 1.5;
    }

    /* Cards */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
      margin-bottom: 1.25rem;
      transition: border-color 0.2s;
    }

    .card:hover { border-color: var(--dim); }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--dim);
      margin-bottom: 1.25rem;
    }

    /* Form */
    .form-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }

    .form-row-full {
      margin-bottom: 0.75rem;
    }

    label {
      display: block;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text2);
      margin-bottom: 0.4rem;
    }

    input[type="text"],
    input[type="datetime-local"],
    textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 0.9rem;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,201,58,0.1);
    }

    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(80%) sepia(50%) saturate(300%) hue-rotate(10deg);
      cursor: pointer;
    }

    textarea { resize: vertical; min-height: 80px; }

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.2rem;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #0f0e00;
    }

    .btn-primary:hover {
      background: var(--accent2);
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(232,201,58,0.3);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: var(--text2);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-test {
      background: var(--bg3);
      color: var(--accent);
      border: 1px solid var(--accent);
      width: 100%;
      justify-content: center;
      padding: 0.9rem;
      font-size: 0.85rem;
    }

    .btn-test:hover {
      background: rgba(232,201,58,0.1);
      box-shadow: 0 0 30px rgba(232,201,58,0.15);
    }

    .btn-test .pulse-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .btn-danger-sm {
      background: transparent;
      border: none;
      color: var(--danger);
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      font-size: 1rem;
      opacity: 0.6;
      transition: opacity 0.2s;
      border-radius: 4px;
    }

    .btn-danger-sm:hover { opacity: 1; background: rgba(224,92,42,0.1); }

    /* Section headers */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--dim);
    }

    .badge {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.2rem 0.6rem;
      font-size: 0.7rem;
      color: var(--text2);
    }

    /* Notification list */
    .notif-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .notif-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
      animation: slideIn 0.25s ease;
      transition: border-color 0.2s, opacity 0.3s;
    }

    .notif-item.fired {
      opacity: 0.4;
      border-color: transparent;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .notif-icon {
      width: 36px; height: 36px;
      background: var(--bg3);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .notif-body { flex: 1; min-width: 0; }

    .notif-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .notif-msg {
      font-size: 0.75rem;
      color: var(--text2);
      margin-bottom: 0.5rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .notif-time {
      font-size: 0.68rem;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .notif-time .countdown {
      color: var(--accent);
      font-weight: 700;
    }

    .notif-status {
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: rgba(232,201,58,0.1);
      color: var(--accent);
      border: 1px solid rgba(232,201,58,0.2);
    }

    .notif-status.fired-badge {
      background: rgba(255,255,255,0.05);
      color: var(--dim);
      border-color: var(--border);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--dim);
    }

    .empty-state .icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 0.8rem;
      line-height: 1.6;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(4rem);
      background: var(--accent);
      color: #0f0e00;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 0.75rem 1.5rem;
      border-radius: 50px;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0;
      white-space: nowrap;
      pointer-events: none;
      box-shadow: 0 8px 30px rgba(232,201,58,0.4);
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 1.75rem 0;
    }

    /* Install prompt */
    #install-btn {
      display: none;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <div class="logo">Notifyr<span>.</span></div>
        <div class="tagline">Scheduled push notifications</div>
      </div>
      <button class="btn btn-ghost" id="install-btn" style="margin-bottom:0.25rem">⬇ Install</button>
    </header>

    <!-- Permission Banner -->
    <div id="permission-banner">
      <p>🔔 Enable notifications to use this app.</p>
      <button class="btn btn-primary" id="grant-btn">Allow</button>
    </div>

    <!-- Test Button Card -->
    <div class="card">
      <div class="card-title">Quick Test</div>
      <button class="btn btn-test" id="test-btn">
        <span class="pulse-dot"></span>
        Send Test Notification Now
      </button>
    </div>

    <!-- Schedule Form Card -->
    <div class="card">
      <div class="card-title">Schedule Notification</div>

      <div class="form-row-full">
        <label for="notif-title">Title</label>
        <input type="text" id="notif-title" placeholder="Reminder title..." maxlength="60" />
      </div>

      <div class="form-row-full">
        <label for="notif-body">Message <span style="color:var(--dim)">(optional)</span></label>
        <textarea id="notif-body" placeholder="Notification body text..." maxlength="200"></textarea>
      </div>

      <div class="form-row">
        <div>
          <label for="notif-time">Date &amp; Time</label>
          <input type="datetime-local" id="notif-time" />
        </div>
        <div style="display:flex;align-items:flex-end">
          <button class="btn btn-primary" id="schedule-btn">
            ＋ Schedule
          </button>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Notification List -->
    <div class="section-header">
      <span class="section-title">Scheduled</span>
      <span class="badge" id="count-badge">0</span>
    </div>

    <div class="notif-list" id="notif-list">
      <div class="empty-state">
        <div class="icon">🕓</div>
        <p>No notifications scheduled yet.<br/>Add one above to get started.</p>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // ─── State ───────────────────────────────────────────────────────────────
    let notifications = JSON.parse(localStorage.getItem('notifyr') || '[]');
    let timers = {};
    let deferredInstall = null;

    // ─── Service Worker ───────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(console.warn);
    }

    // ─── Permission ───────────────────────────────────────────────────────────
    function checkPermission() {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'default') {
        document.getElementById('permission-banner').classList.add('show');
      }
    }

    document.getElementById('grant-btn').addEventListener('click', async () => {
      const perm = await Notification.requestPermission();
      if (perm === 'granted') {
        document.getElementById('permission-banner').classList.remove('show');
        showToast('Notifications enabled ✓');
      }
    });

    // ─── PWA Install ─────────────────────────────────────────────────────────
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredInstall = e;
      document.getElementById('install-btn').style.display = 'inline-flex';
    });

    document.getElementById('install-btn').addEventListener('click', () => {
      if (deferredInstall) deferredInstall.prompt();
    });

    // ─── Toast ────────────────────────────────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    // ─── Test Notification ────────────────────────────────────────────────────
    document.getElementById('test-btn').addEventListener('click', async () => {
      if (Notification.permission !== 'granted') {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') { showToast('Permission denied ✕'); return; }
      }
      fireNotification('🔔 Test Notification', 'This is a test from Notifyr. It works!');
      showToast('Test notification sent!');
    });

    // ─── Fire Notification ────────────────────────────────────────────────────
    function fireNotification(title, body) {
      if (Notification.permission !== 'granted') return;

      // Try service worker (for better mobile support)
      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({
          type: 'NOTIFY', title, body
        });
      } else {
        new Notification(title, {
          body,
          icon: 'icons/icon-192.png',
          badge: 'icons/icon-192.png'
        });
      }
    }

    // ─── Schedule ─────────────────────────────────────────────────────────────
    document.getElementById('schedule-btn').addEventListener('click', async () => {
      if (Notification.permission !== 'granted') {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') { showToast('Permission denied ✕'); return; }
        document.getElementById('permission-banner').classList.remove('show');
      }

      const title = document.getElementById('notif-title').value.trim();
      const body  = document.getElementById('notif-body').value.trim();
      const time  = document.getElementById('notif-time').value;

      if (!title) { showToast('Please enter a title'); return; }
      if (!time)  { showToast('Please pick a date & time'); return; }

      const ts = new Date(time).getTime();
      if (ts <= Date.now()) { showToast('Pick a future time!'); return; }

      const id = crypto.randomUUID();
      const notif = { id, title, body, ts, fired: false };
      notifications.push(notif);
      save();
      render();
      scheduleTimer(notif);

      document.getElementById('notif-title').value = '';
      document.getElementById('notif-body').value = '';
      document.getElementById('notif-time').value = '';
      showToast('Notification scheduled ✓');
    });

    // ─── Timer ────────────────────────────────────────────────────────────────
    function scheduleTimer(notif) {
      const delay = notif.ts - Date.now();
      if (delay <= 0 || notif.fired) return;
      clearTimeout(timers[notif.id]);
      timers[notif.id] = setTimeout(() => {
        fireNotification(notif.title, notif.body || 'Notifyr reminder');
        const n = notifications.find(n => n.id === notif.id);
        if (n) { n.fired = true; save(); render(); }
      }, delay);
    }

    function clearTimerFor(id) {
      clearTimeout(timers[id]);
      delete timers[id];
    }

    // ─── Delete ───────────────────────────────────────────────────────────────
    function deleteNotif(id) {
      clearTimerFor(id);
      notifications = notifications.filter(n => n.id !== id);
      save();
      render();
      showToast('Removed');
    }

    // ─── Save ─────────────────────────────────────────────────────────────────
    function save() {
      localStorage.setItem('notifyr', JSON.stringify(notifications));
    }

    // ─── Countdown ────────────────────────────────────────────────────────────
    function formatCountdown(ts) {
      const diff = ts - Date.now();
      if (diff <= 0) return 'now';
      const s = Math.floor(diff / 1000);
      const m = Math.floor(s / 60);
      const h = Math.floor(m / 60);
      const d = Math.floor(h / 24);
      if (d > 0) return `${d}d ${h % 24}h`;
      if (h > 0) return `${h}h ${m % 60}m`;
      if (m > 0) return `${m}m ${s % 60}s`;
      return `${s}s`;
    }

    function formatDate(ts) {
      return new Date(ts).toLocaleString([], {
        month: 'short', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
      });
    }

    // ─── Render ───────────────────────────────────────────────────────────────
    function render() {
      const list = document.getElementById('notif-list');
      const badge = document.getElementById('count-badge');
      const pending = notifications.filter(n => !n.fired);
      badge.textContent = pending.length;

      if (notifications.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <div class="icon">🕓</div>
            <p>No notifications scheduled yet.<br/>Add one above to get started.</p>
          </div>`;
        return;
      }

      // Sort: pending first, then fired
      const sorted = [...notifications].sort((a, b) => {
        if (a.fired !== b.fired) return a.fired ? 1 : -1;
        return a.ts - b.ts;
      });

      list.innerHTML = sorted.map(n => `
        <div class="notif-item ${n.fired ? 'fired' : ''}" id="item-${n.id}">
          <div class="notif-icon">${n.fired ? '✓' : '🔔'}</div>
          <div class="notif-body">
            <div class="notif-title">${escHtml(n.title)}</div>
            ${n.body ? `<div class="notif-msg">${escHtml(n.body)}</div>` : ''}
            <div class="notif-time">
              ${formatDate(n.ts)}
              ${!n.fired ? `<span class="countdown" id="cd-${n.id}">— ${formatCountdown(n.ts)}</span>` : ''}
              <span class="notif-status ${n.fired ? 'fired-badge' : ''}">${n.fired ? 'sent' : 'pending'}</span>
            </div>
          </div>
          <button class="btn-danger-sm" onclick="deleteNotif('${n.id}')" title="Remove">✕</button>
        </div>
      `).join('');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Live countdown update
    setInterval(() => {
      notifications.filter(n => !n.fired).forEach(n => {
        const el = document.getElementById(`cd-${n.id}`);
        if (el) el.textContent = `— ${formatCountdown(n.ts)}`;
      });
    }, 1000);

    // ─── Init ─────────────────────────────────────────────────────────────────
    // Set min datetime to now
    const nowLocal = new Date(Date.now() - new Date().getTimezoneOffset() * 60000)
      .toISOString().slice(0, 16);
    document.getElementById('notif-time').min = nowLocal;

    checkPermission();
    render();
    // Re-schedule all pending timers on load
    notifications.filter(n => !n.fired).forEach(scheduleTimer);
  </script>
</body>
</html>
